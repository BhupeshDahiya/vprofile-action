name: vpro-actions
on: workflow_dispatch
env:
    AWS_REGION: us-east-1
    ECR_REPOSITORY: vpro-app
    EKS_CLUSTER: vpro-gitops-eks

jobs:
    Testing:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v6

            - name: Mvn test
              run: mvn test
            
            - name: Checkstyle
              run: mvn checkstyle:checkstyle

            - name: set java 11
              uses: actions/setup-java@v5.2.0
              with:
                distribution: 'temurin'
                java-version: '11'

            - name: setup sonar
              uses: Warchant/setup-sonar-scanner@v9

            # Run sonar-scanner
            - name: SonarQube Scan
              run: sonar-scanner 
                    -Dsonar.host.url=${{ secrets.SONAR_URL }} 
                    -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
                    -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} 
                    -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} 
                    -Dsonar.sources=src/ 
                    -Dsonar.junit.reportsPath=target/surefire-reports/ 
                    -Dsonar.jacoco.reportsPath=target/jacoco.exec 
                    -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml 
                    -Dsonar.java.binaries=target/test-classes/com/visualpathit/account/controllerTest/

            ## Check the Quality Gate status. Skipping cuz you cant change QG in free plan
            #- name: SonarQube Quality Gate check
            #  id: sonarqube-quality-gate-check
            #  uses: sonarsource/sonarqube-quality-gate-action@master
            #    # Force to fail step after specific time.
            #  timeout-minutes: 5
            #  env:
            #    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            #    SONAR_HOST_URL: ${{ secrets.SONAR_URL }} #OPTIONAL
    BUILD_AND_PUBLISH:
        needs: Testing
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v6

            - name: upload image to ECR
              uses: appleboy/docker-ecr-action@master
              with:
                access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
                secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                registry: ${{ secrets.REGISTRY }}
                repo: ${{env.ECR_REPOSITORY}}
                region: ${{env.AWS_REGION}}
                tags: latest,${{github.run_number}}
                daemon_off: false
                dockerfile: ./Dockerfile
                context: ./

    DeployToEKS:
        needs: BUILD_AND_PUBLISH
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v6

            - name: Config aws
              uses: aws-actions/configure-aws-credentials@v6.0.0
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{env.AWS_REGION}}

            - name: Get kube config file
              run: aws eks update-kubeconfig --region ${{env.AWS_REGION}} --name ${{env.EKS_CLUSTER}}

            - name: Print config file
              run: cat ~/.kube/config
            
            - name: login to ecr
              run: kubectl create secret docker-registry regcred --docker-server=${{secrets.REGISTRY}} --docker-username=AWS --docker-password=$(aws ecr get-login-password)

            - name: Deploy Helm
              uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{env.AWS_REGION}}
                cluster-name: ${{env.EKS_CLUSTER}}
                #config-files: .github/values/dev.yaml
                chart-path: helm/vprocharts
                namespace: default
                values: appimage=${{secrets.REGISTRY}}/${{env.ECR_REPOSITORY}},apptag=${{github.run_number}}
                name: vpro-stacks